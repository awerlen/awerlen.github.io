{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="site-nav" aria-label="Primary navigation">
        <a class="site-nav__brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <button class="site-nav__toggle" type="button" aria-expanded="false" aria-controls="site-nav-panel" aria-label="Toggle navigation">
          <span class="site-nav__toggle-bar"></span>
          <span class="site-nav__toggle-bar"></span>
          <span class="site-nav__toggle-bar"></span>
        </button>
        <ul id="site-nav-panel" class="site-nav__panel">
          {% for link in site.data.navigation.main %}
            <li class="site-nav__item"><a href="{{ link.url | relative_url }}">{{ link.title }}</a></li>
          {% endfor %}
        </ul>
      </nav>
    </div>
  </div>
</div>
